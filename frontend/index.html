<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aila — Your PH Transit Buddy 🦅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&family=Lora:ital,wght@0,600;0,700;1,600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; padding: 0; }
      body { font-family: 'Nunito', ui-rounded, system-ui, sans-serif; background: #FDF6EC; }
      /* Google Places autocomplete dropdown styling */
      .pac-container {
        z-index: 99999 !important;
        border-radius: 16px !important;
        border: 1px solid #D4DAF5 !important;
        box-shadow: 0 8px 32px rgba(27,47,110,0.15) !important;
        font-family: 'Nunito', sans-serif !important;
        margin-top: 4px !important;
        overflow: hidden;
      }
      .pac-item {
        padding: 10px 16px !important;
        font-family: 'Nunito', sans-serif !important;
        font-size: 13px !important;
        cursor: pointer;
        border-top: 1px solid #EEF1FB !important;
      }
      .pac-item:hover { background: #EEF1FB !important; }
      .pac-item-query { color: #1B2F6E !important; font-weight: 700 !important; }
      /* Leaflet overrides */
      .leaflet-popup-content-wrapper {
        border-radius: 14px !important;
        font-family: 'Nunito', sans-serif !important;
        box-shadow: 0 8px 24px rgba(27,47,110,0.2) !important;
      }
      .leaflet-popup-content { font-size: 13px; line-height: 1.6; color: #1B2F6E; }
      /* Scrollbar */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #A9B5EB; border-radius: 99px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
